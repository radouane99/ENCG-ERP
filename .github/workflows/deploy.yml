name: Deploy ERP to Production
on:
  push:
    branches:
      - main
jobs:
  test-and-build:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, zip, exif, pcntl, bcmath, gd
      - name: Install Composer Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --prefer-dist
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install NPM Dependencies & Build Assets
        run: |
          npm install
          npm run build
      - name: Create .env for testing
        run: cp .env.example .env
      - name: Run Code Style Check (Pint)
        run: vendor/bin/pint --test
      - name: Run Static Analysis (PHPStan)
        run: vendor/bin/phpstan analyse --memory-limit=2G
      - name: Run Laravel Tests
        run: php artisan test

  deploy:
    name: Deploy to Server via Docker
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/encg-portail            
            git pull origin main
            docker-compose up -d --build
            docker-compose exec -T app composer install --optimize-autoloader --no-dev
            docker-compose exec -T app php artisan migrate --force
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache

