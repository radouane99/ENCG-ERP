name: Deploy ENCG-ERP to Production

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none

      - name: Install PHP Dependencies
        working-directory: ./backend
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

      - name: Generate key for testing
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHP Tests
        working-directory: ./backend
        run: php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: false # هذا السطر هو ما يوقف הـ Deploy job مؤقتاً
    steps:
      - name: Deployment Skipped
        run: echo "Deployment skipped - No server configured."