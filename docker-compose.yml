services:

  # ──────────────────────────────────────────────────────────
  # Nginx — Reverse proxy + static assets
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: encg_nginx
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:cached
    depends_on:
      - backend
      - frontend
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Backend — Laravel 12 / PHP 8.4-FPM (Alpine)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: encg_backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Laravel Reverb — WebSocket server
  # ──────────────────────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: encg_reverb
    command: php artisan reverb:start --host="0.0.0.0" --port=8080 --no-interaction
    ports:
      - '8080:8080'
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Laravel Horizon — Queue worker
  # ──────────────────────────────────────────────────────────
  queue-worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: encg_queue_worker
    command: php artisan horizon
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Frontend — React + Vite (dev server)
  # ──────────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: encg_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    ports:
      - '5173:5173'
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: encg_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: encg_erp
      POSTGRES_USER: encg
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - encgnet
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U encg -d encg_erp']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Redis — Cache / Sessions / Queues
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: encg_redis
    ports:
      - '6379:6379'
    command: redis-server --requirepass secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - encgnet
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'secret', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: encg_minio
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - encgnet
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # MinIO Init — Create default buckets
  # ──────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: encg_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing local/encg-documents;
      mc mb --ignore-existing local/encg-private;
      mc anonymous set download local/encg-documents;
      echo 'MinIO buckets initialized.';
      "
    networks:
      - encgnet

  # ──────────────────────────────────────────────────────────
  # Mailpit — Local SMTP + Web UI
  # ──────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: encg_mailpit
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI → http://localhost:8025
    networks:
      - encgnet
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # pgAdmin — PostgreSQL Web UI
  # ──────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: encg_pgadmin
    ports:
      - '5050:80'     # Web UI → http://localhost:5050
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@encg.ma
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - encgnet
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  encgnet:
    driver: bridge

# ──────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
