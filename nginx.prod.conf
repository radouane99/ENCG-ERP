server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html index.htm;

    # Serve React Frontend (assuming it's in /var/www/html/public/dist)
    # Actually, a better setup is separating them or alias
    # Let's route all non-api traffic to the React index.html
    
    location / {
        alias /var/www/html/public/dist/;
        try_files $uri $uri/ /index.html;
    }

    # Serve Laravel API and Sanctum routes
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM container
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Deny access to .htaccess files
    location ~ /\.ht {
        deny all;
    }
}
