server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # ── File upload size ─────────────────────────────────────
    client_max_body_size 100M;

    # ── Backend API ──────────────────────────────────────────
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Sanctum CSRF / cookie auth ───────────────────────────
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel health check ─────────────────────────────────
    location = /up {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel Horizon dashboard ────────────────────────────
    location ^~ /horizon {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Laravel Telescope (dev) ──────────────────────────────
    location ^~ /telescope {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── API docs ─────────────────────────────────────────────
    location ^~ /docs {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Storage (public disk) ────────────────────────────────
    location /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── MinIO S3 proxy (so frontend can use relative /s3 paths) ──
    location /s3/ {
        set $minio http://minio:9000;
        proxy_pass $minio/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        set $backend backend:9000;
        fastcgi_pass $backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 600;
        fastcgi_connect_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffer_size 512k;
        fastcgi_buffers 16 512k;
        fastcgi_busy_buffers_size 512k;
    }

    # ── Frontend (Vite dev server) ───────────────────────────
    # Must come last — catches everything not matched above.
    location / {
        set $frontend http://frontend:5173;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Vite HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
