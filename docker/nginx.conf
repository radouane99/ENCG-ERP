server {
    listen 80;
    server_name erp.encg.ma;

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Allow certbot to verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name erp.encg.ma;

    # SSL Certificates (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/erp.encg.ma/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.encg.ma/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/html/public;
    index index.php index.html;

    # Serve static assets efficiently
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # React frontend assets
    location /frontend/ {
        try_files $uri $uri/ /frontend/index.html;
    }

    # Pass PHP scripts to FastCGI server
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
