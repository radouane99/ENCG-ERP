version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: encg-erp-app
    restart: unless-stopped
    container_name: encg_erp_prod_app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - ./backend/.env.production:/var/www/html/.env
      - storage-data:/var/www/html/storage
    depends_on:
      - db
      - redis
    networks:
      - encg-network

  nginx:
    image: nginx:alpine
    container_name: encg_erp_prod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      # Need to mount the frontend assets so Nginx can serve them directly, or let PHP-FPM serve them (but Nginx is better)
      - ./backend/public:/var/www/html/public
      - storage-data:/var/www/html/storage
      # Mount certbot for SSL
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - encg-network

  db:
    image: mysql:8.0
    container_name: encg_erp_prod_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-encg_erp}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-encg_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - encg-network

  redis:
    image: redis:alpine
    container_name: encg_erp_prod_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - encg-network

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encg_erp_prod_worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend/.env.production:/var/www/html/.env
      - storage-data:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - encg-network

networks:
  encg-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  storage-data:
