version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: encg_erp_prod_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
    env_file:
      - .env.production
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
      - redis
    networks:
      - encg_prod_network

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      # Mount public assets from app container if needed, or rely on app container building them in
      # We mount a named volume or use the same build
    volumes_from:
      - app
    depends_on:
      - app
    networks:
      - encg_prod_network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-encg_erp_prod}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - encg_prod_network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - encg_prod_network

networks:
  encg_prod_network:
    driver: bridge

volumes:
  dbdata:
  redisdata:
